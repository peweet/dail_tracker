name: Audit

on:
  schedule:
    - cron: "0 8 * * 1"   # Monday 08:00 UTC
  workflow_dispatch:
  pull_request:
    paths:
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/audit.yml"

permissions:
  contents: read
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      # Full env (core + pipeline extra + dev group) so the audit covers every
      # locked dependency, not just the app runtime. pip-audit is in the dev
      # group (pyproject [dependency-groups]), so it installs with the sync — no
      # ad-hoc `uv pip install` that would escape the lockfile.
      - run: uv sync --frozen --extra pipeline --group dev
      # --strict: fail on any vuln. Drop later only if consistent unfixable
      # transitive CVEs become a problem (use --ignore-vuln GHSA-xxxx with a
      # comment + revisit date — not a blanket disable).
      - name: Run pip-audit
        run: uv run pip-audit --strict --desc
      - name: Open issue on failure (scheduled runs only)
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              ...context.repo,
              title: `Weekly pip-audit found vulnerabilities (${new Date().toISOString().slice(0, 10)})`,
              body: `Audit run failed: ${context.payload.repository.html_url}/actions/runs/${context.runId}\n\nTriage on next dep-PR cycle.`,
              labels: ["security", "deps"],
            });
