page:
  name: member_overview
  title: "Dáil Member Overview"
  description: >-
    Thin Streamlit page contract for a member-level dashboard. The page should read
    from a single mart or view and avoid embedding business logic in Python.
  owner: "data-pipeline"
  ui_owner: "streamlit"

ui_assets:
  stylesheet_paths:
    - "utility/styles/base.css"
  streamlit_theme_path: ".streamlit/config.toml"
  load_css_via: "st.html"
  theme_mode: "newsroom_light"
  layout_rules:
    hero_variant: "editorial"
    filters_position: "sidebar"
    metrics_variant: "minimal_border"
    table_variant: "dense_reference"
  notes_for_ai:
    - "Preserve the shared stylesheet. Do not inline a new global CSS system in the page."
    - "Use the stylesheet classes dt-hero, dt-kicker, dt-dek, dt-badge, and dt-provenance-box where helpful."
    - "Focus edits on layout, copy hierarchy, chart choices, and table usability."
    - "If styling requires a shared change, update utility/styles/base.css instead of adding page-local CSS."

data_source:
  database: "data/gold/dail.duckdb"
  relation: "mart_member_overview"
  grain: "one row per member"
  primary_key: "member_id"
  refresh_expectation: "per pipeline run"

filters:
  - name: party_name
    label: "Party"
    type: "multiselect"
    column: "party_name"
  - name: constituency
    label: "Constituency"
    type: "multiselect"
    column: "constituency"
  - name: government_status
    label: "Government / Opposition"
    type: "multiselect"
    column: "government_status"
  - name: minimum_attendance_rate
    label: "Minimum attendance rate"
    type: "slider"
    column: "attendance_rate"
    min: 0
    max: 1
    step: 0.05
    default: 0

headline_metrics:
  - name: members_count
    label: "Members"
    kind: "row_count"
  - name: avg_attendance_rate
    label: "Avg attendance"
    kind: "mean"
    column: "attendance_rate"
    format: "percent"
  - name: total_questions
    label: "Questions asked"
    kind: "sum"
    column: "questions_asked_count"
  - name: total_bills_sponsored
    label: "Bills sponsored"
    kind: "sum"
    column: "bills_sponsored_count"

columns:
  - name: member_name
    label: "Member"
    type: "text"
    visible: true
  - name: party_name
    label: "Party"
    type: "text"
    visible: true
  - name: constituency
    label: "Constituency"
    type: "text"
    visible: true
  - name: government_status
    label: "Gov/Opp"
    type: "text"
    visible: true
  - name: attendance_rate
    label: "Attendance rate"
    type: "percent"
    visible: true
  - name: questions_asked_count
    label: "Questions"
    type: "integer"
    visible: true
  - name: bills_sponsored_count
    label: "Bills sponsored"
    type: "integer"
    visible: true
  - name: declared_interests_count
    label: "Declared interests"
    type: "integer"
    visible: true
  - name: payment_total_eur
    label: "Payments (€)"
    type: "currency"
    visible: true
  - name: lobbying_interactions_count
    label: "Lobbying interactions"
    type: "integer"
    visible: true
  - name: revolving_door_flag
    label: "Revolving door"
    type: "boolean"
    visible: true
  - name: provenance_summary
    label: "Data source"
    type: "text"
    visible: false

sorting:
  default_sort_by: "questions_asked_count"
  default_sort_direction: "desc"

exports:
  enabled: true
  formats:
    - csv

provenance:
  show_panel: true
  fields:
    - latest_run_id
    - latest_fetch_timestamp_utc
    - source_summary
    - mart_version
    - code_version
  panel_text: >-
    This page is built from a precomputed DuckDB mart. The UI does not recompute
    business logic; it only filters and displays pipeline-owned outputs.

notes_for_ai:
  purpose: >-
    Generate only page layout, filters, metrics, and display code from this file.
    Do not invent joins, KPI definitions, or business rules in Streamlit.
  do_not_do:
    - "Do not join raw tables in the UI"
    - "Do not define new metrics in Python unless they are pure presentation"
    - "Do not rename columns unless display labels are provided here"
    - "If you need merge/groupby/pivot logic, add TODO_GOLD_REFACTOR instead of implementing it"
