contract_version: 1
page:
  id: payments
  title: Parliamentary Payments
  route: utility/pages_code/payments.py
  nav_label: Payments
  nav_icon: €
  status: active
  priority: primary
intent:
  user_promise: Inspect published parliamentary payment and allowance records by member, year, category, amount, and source.
  primary_users:
  - public
  - journalists
  - researchers
  top_questions:
  - What payments are associated with a member?
  - Which years/categories are represented?
  - What source supports a payment record?
design:
  aesthetic: newsroom_light
  tone: direct_civic_accountable
  css_source: utility/styles/base.css
  reuse_classes:
  - dt-hero
  - dt-kicker
  - dt-dek
  - dt-badge
  - dt-callout
  - dt-provenance-box
  layout:
    hero: editorial
    filters: sidebar
    density: compact
    mobile_strategy: stack_filters_then_table
  avoid:
  - generic_streamlit_defaults
  - purple_gradients
  - glassmorphism
  - custom_js
  - page_local_global_css
data_access:
  mode: duckdb_sql_over_pipeline_views
  database: data/gold/dail.duckdb
  view_owner: pipeline
  raw_parquet_access_in_streamlit: false
  approved_relations:
  - name: v_member_payments
    role: primary
    grain: one row per member payment category/year/source record
    primary_key: payment_record_id
    required_columns:
    - payment_record_id
    - member_id
    - member_name
    - party_name
    - constituency
    - payment_year
    - payment_category
    - amount_eur
    - payment_total_member_year_eur
    - source_document_name
    - source_pdf_url
    - source_page_number
    - latest_fetch_timestamp_utc
    optional_columns: []
    provenance_columns:
    - latest_run_id
    - latest_fetch_timestamp_utc
    - source_summary
    - mart_version
    - code_version
  - name: v_payments_summary
    role: summary
    grain: one row for latest payments summary
    primary_key: latest_run_id
    required_columns:
    - latest_run_id
    - payment_records_count
    - members_with_payments_count
    - total_amount_eur
    - latest_payment_year
    optional_columns: []
    provenance_columns:
    - latest_run_id
    - latest_fetch_timestamp_utc
    - source_summary
    - mart_version
    - code_version
  - name: v_payments_category_summary
    role: chart
    grain: one row per payment category
    primary_key: payment_category
    required_columns:
    - payment_category
    - records_count
    - amount_eur
    optional_columns: []
    provenance_columns:
    - latest_run_id
    - latest_fetch_timestamp_utc
    - source_summary
    - mart_version
    - code_version
sql_policy:
  claude_may_generate_sql: true
  sql_kind_allowed: retrieval_only
  parameterized_queries_required: true
  explicit_column_projection_required: true
  allowed_statements:
  - SELECT
  forbidden_sql:
  - JOIN
  - GROUP_BY
  - HAVING
  - WINDOW
  - CTE_FOR_MODELLING
  - CREATE
  - INSERT
  - UPDATE
  - DELETE
  - read_parquet
  - parquet_scan
  allowed_filter_columns:
    member_name:
      operators:
      - ILIKE
      parameterized: true
    payment_year:
      operators:
      - IN
      parameterized: true
    payment_category:
      operators:
      - IN
      parameterized: true
    party_name:
      operators:
      - IN
      parameterized: true
    amount_eur:
      operators:
      - BETWEEN
      parameterized: true
  allowed_sort_columns:
  - member_name
  - party_name
  - constituency
  - payment_year
  - payment_category
  - amount_eur
  - payment_total_member_year_eur
  - source_pdf_url
  - source_page_number
  max_rows_default: 1000
  max_rows_hard_limit: 10000
  missing_capability_action: TODO_PIPELINE_VIEW_REQUIRED
filters:
- name: member_search
  label: Search member
  type: text_search
  column: member_name
  operator: ILIKE
  source: typed_input
  essential: true
  default: ''
  help: ''
- name: payment_year
  label: Year
  type: multiselect
  column: payment_year
  operator: IN
  source: distinct_values_query
  essential: true
  default: []
  help: ''
- name: payment_category
  label: Category
  type: multiselect
  column: payment_category
  operator: IN
  source: distinct_values_query
  essential: true
  default: []
  help: ''
- name: party_name
  label: Party
  type: multiselect
  column: party_name
  operator: IN
  source: distinct_values_query
  essential: false
  default: []
  help: ''
- name: amount_eur_range
  label: Amount range
  type: number_range
  column: amount_eur
  operator: BETWEEN
  source: typed_input
  essential: false
  default: ''
  help: ''
metrics:
- name: visible_payment_records
  label: Visible records
  source: ui_result_count
  relation: v_member_payments
  column: null
  format: integer
  filtered: true
  ui_aggregation_allowed: true
- name: payment_records_count
  label: Payment records
  source: pipeline_summary_view
  relation: v_payments_summary
  column: payment_records_count
  format: integer
  filtered: false
  ui_aggregation_allowed: false
- name: total_amount_eur
  label: Total amount
  source: pipeline_summary_view
  relation: v_payments_summary
  column: total_amount_eur
  format: currency_eur
  filtered: false
  ui_aggregation_allowed: false
visuals:
- name: payments_by_category
  type: bar
  relation: v_payments_category_summary
  x: payment_category
  y: amount_eur
  color: null
  purpose: Show payment amount by category from pipeline summary.
  required: false
tables:
- name: payments_table
  relation: v_member_payments
  role: evidence
  default_sort_by: amount_eur
  default_sort_direction: desc
  columns:
  - name: member_name
    label: Member
    type: text
    visible: true
    width: medium
    help: null
  - name: party_name
    label: Party
    type: text
    visible: true
    width: small
    help: null
  - name: constituency
    label: Constituency
    type: text
    visible: true
    width: medium
    help: null
  - name: payment_year
    label: Year
    type: integer
    visible: true
    width: small
    help: null
  - name: payment_category
    label: Category
    type: text
    visible: true
    width: medium
    help: null
  - name: amount_eur
    label: Amount €
    type: currency_eur
    visible: true
    width: small
    help: null
  - name: payment_total_member_year_eur
    label: Member-year total €
    type: currency_eur
    visible: false
    width: small
    help: null
  - name: source_pdf_url
    label: Source PDF
    type: url
    visible: true
    width: medium
    help: null
  - name: source_page_number
    label: Page
    type: integer
    visible: false
    width: small
    help: null
exports:
  enabled: true
  formats:
  - csv
  filename_pattern: dail_tracker_payments_{date}.csv
  export_scope: displayed_rows_only
provenance:
  show_panel: true
  required_fields:
  - latest_run_id
  - latest_fetch_timestamp_utc
  - source_summary
  - mart_version
  - code_version
  caveat_text: Payments are extracted from published documents. Amounts and totals are pipeline-owned.
empty_states:
- condition: no_rows
  title: No payments records match these filters
  body: Try clearing one or more filters.
  recovery_hint: Clear filters or refresh the pipeline outputs.
- condition: missing_relation
  title: Parliamentary Payments view is missing
  body: The approved relation `v_member_payments` is not available in DuckDB.
  recovery_hint: Run the pipeline or implement the required view.
- condition: missing_columns
  title: View shape changed
  body: Required columns are missing from the approved relation.
  recovery_hint: Align the pipeline view and YAML contract.
out_of_scope:
- Do not calculate totals in Streamlit.
- Do not parse payment PDFs in Streamlit.
- Do not infer member matches in Streamlit.
logic_firewall:
  forbidden_python:
  - pandas_merge
  - pandas_join
  - pandas_groupby
  - pandas_pivot
  - polars_join
  - polars_group_by
  - fuzzy_match
  - raw_file_scan
  - api_call
  - pdf_parse
  - hardcoded_abs_path
  allowed_python:
  - render
  - format
  - parameter_binding
  - dataframe_column_selection
  - csv_export
  - empty_state
  missing_data_action: TODO_PIPELINE_VIEW_REQUIRED
acceptance_tests:
- Page file contains no merge, join, groupby, pivot, fuzzy matching, API calls, PDF parsing, raw Parquet scans, or hardcoded
  absolute local paths.
- SQL uses only approved relations, columns, filters, sort columns, and limits from this contract.
- Required columns are validated before rendering the table.
- CSV export contains only currently displayed rows.
- Provenance panel renders when required fields are available.
