contract_version: 5

page:
  id: member_overview
  title: "Member Overview"
  route: "utility/pages_code/member_overview.py"
  user_question: "What is the public accountability profile of this member across approved datasets?"
  existing_page_is: functional_reference_not_design_reference

data_access:
  mode: duckdb_in_process_registered_analytical_views
  persistent_duckdb_file: null
  streamlit_may_register_views: false
  streamlit_may_read_parquet: false
  connection_owner: application_or_pipeline_exposition_layer

approved_registered_views:
  - v_member_overview
  - v_member_profile_summary
  - v_member_dataset_presence

retrieval_sql_policy:
  allowed_statements: [SELECT]
  allowed_clauses: [WHERE, ORDER_BY, LIMIT]
  forbidden_clauses: [JOIN, GROUP_BY_MULTI_DIM, HAVING, WINDOW, CREATE_VIEW, CREATE_TABLE, INSERT, UPDATE, DELETE]
  allowed_aggregate_functions: ["COUNT(*)", "COUNT(DISTINCT col)", "MAX(col)", "MIN(col)"]
  forbidden_functions: [read_parquet, parquet_scan]
  parameter_binding_required: true
  missing_data_action: TODO_PIPELINE_VIEW_REQUIRED

temporal:
  mode: none
  primary_column: null
  date_format_policy:
    iso_date_values: "use calendar/date-range controls"
    reporting_year_values: "use year selector or year range controls"
    timelines: "left-to-right chronological"

uses_patterns:
  - member_drilldown
  - csv_export
  - government_source_links

ui_creativity_budget:
  level: very_high
  mandatory_bold_redesign: true
  existing_page_may_be_used_for_functionality_only: true
  must_be_materially_different_from_existing_page: true
  must_change_at_least:
    count: 6
    dimensions:
      - editorial_hero
      - information_hierarchy
      - filter_placement
      - section_order
      - table_configuration
      - chart_or_timeline_presentation
      - member_or_record_drilldown
      - csv_export_placement
      - source_link_presentation
      - empty_states
      - mobile_flow
      - shared_css_polish
  may_rethink:
    - layout
    - interaction_model
    - visual_hierarchy
    - chart_choice
    - table_usability
    - detail_panels
    - filter_controls
    - source_link_display
    - responsive_order
  must_preserve:
    - backend_logic
    - data_semantics
    - approved_registered_views
    - approved_columns
    - approved_filters
    - metric_meaning
    - export_requirements
    - provenance_requirements

interaction_model:
  specific_guidance: "Do not create cross-dataset member profile logic in Streamlit. Use approved profile views only."
  required_flow:
    - editorial_hero
    - primary_controls
    - evidence_summary
    - main_table_or_index
    - detail_or_drilldown
    - official_sources
    - csv_export
    - provenance

exports:
  csv:
    enabled: true
    behaviour: current_displayed_view_only
    respects_filters: true
    respects_temporal_scope: true
    does_not_recompute_dataset: true

source_links:
  enabled: true
  approved_url_columns:
    - source_url
    - source_document_url
    - official_pdf_url
    - oireachtas_url
    - legislation_url
  display: labelled_links_not_raw_urls
  missing_url_action: "TODO_PIPELINE_VIEW_REQUIRED: source URL column"

acceptance_tests:
  - page_visibly_differs_from_old_layout
  - no_backend_files_modified
  - no_read_parquet_or_parquet_scan_in_page
  - no_create_view_or_table_in_page
  - no_modelling_joins_or_groupby_in_streamlit
  - csv_export_exports_current_displayed_view
  - source_links_use_approved_url_columns
  - temporal_controls_match_semantic_type
  - TODO_PIPELINE_VIEW_REQUIRED_used_for_missing_data
