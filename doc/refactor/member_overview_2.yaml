page:
  id: member_overview
  title: "Member Overview"
  mart: "mart_member_overview"

filters:
  - column: "party"
    type: "multiselect"
  - column: "constituency"
    type: "multiselect"

metrics:
  - id: "members"
    label: "Members"
    field: "member_id"
    agg: "count_distinct"
  - id: "questions"
    label: "Questions Asked"
    field: "questions_asked"
    agg: "sum"

table:
  columns:
    - "member_name"
    - "party"
    - "attendance_rate"
    - "questions_asked"
    - "bills_sponsored"

charts:
  - type: "bar"
    x: "member_name"
    y: "questions_asked"
    sort: "desc"
    top_n: 15

export:
  csv: true

provenance:
  show: true
  fields:
    - "source_name"
    - "source_url"
    - "refresh_date"
    - "mart_version"