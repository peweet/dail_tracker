name: CLA Assistant

# Enforces the Contributor Licence Agreement (CLA.md). The project is
# dual-licensed (AGPL + commercial), so every contributor must grant the right to
# relicense their contribution — see CLA.md and doc/COMMERCIALISATION_PLAN.md.
#
# How it works: on every PR the bot checks whether each author has signed. If
# not, it comments asking them to reply with the sign-off sentence; their reply
# is recorded in a JSON file on a dedicated `cla-signatures` branch (keeps `main`
# history clean — the bot auto-creates the branch on first signature). The PR's
# CLA status check stays red until signed, so unsigned contributions can't be
# merged. Existing signatories are never re-prompted.
#
# Setup: none beyond merging this file — same-repo storage uses the built-in
# GITHUB_TOKEN. (Only set a PERSONAL_ACCESS_TOKEN secret if you later move
# signatures to a separate private repo.) While you are the sole author this is
# dormant; it activates the first time someone else opens a PR.

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

concurrency:
  group: cla-${{ github.ref }}
  cancel-in-progress: false

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        if: >-
          (github.event.comment.body == 'recheck' ||
           github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') ||
          github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: 'signatures/version1/cla.json'
          path-to-document: 'https://github.com/peweet/dail_tracker/blob/main/CLA.md'
          branch: 'cla-signatures'
          # The project owner and bots never need to sign.
          allowlist: peweet,dependabot[bot],*[bot]
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-notsigned-prcomment: >-
            Thanks for your contribution! Before we can merge it, please read our
            **[Contributor Licence Agreement](https://github.com/peweet/dail_tracker/blob/main/CLA.md)**.
            Dáil Tracker is dual-licensed (AGPL + commercial), so the CLA lets us
            keep offering both. To sign, post a comment with exactly:
          custom-allsigned-prcomment: >-
            All contributors have signed the CLA. ✅
