version: 2
updates:
  - package-ecosystem: uv
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: Europe/Dublin
    open-pull-requests-limit: 5
    groups:
      python-deps:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    labels: ["deps"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels: ["deps", "ci"]
