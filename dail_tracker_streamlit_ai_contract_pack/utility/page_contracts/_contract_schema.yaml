contract_version: 1
schema_notes:
  purpose: Human-readable schema for Dáil Tracker page contracts.
  principle: Streamlit retrieves and presents pipeline-owned analytical views. Contracts do not define business logic.
required_sections:
  - page
  - intent
  - design
  - data_access
  - sql_policy
  - filters
  - metrics
  - visuals
  - tables
  - exports
  - provenance
  - empty_states
  - out_of_scope
  - logic_firewall
  - acceptance_tests
sql_policy_allowed:
  - SELECT explicit columns
  - FROM approved relations
  - WHERE approved filters
  - ORDER BY approved columns
  - LIMIT
sql_policy_forbidden:
  - JOIN
  - GROUP BY
  - HAVING
  - WINDOW
  - CREATE
  - INSERT
  - UPDATE
  - DELETE
  - read_parquet
  - parquet_scan
logic_firewall_forbidden_python:
  - pandas_merge
  - pandas_join
  - pandas_groupby
  - pandas_pivot
  - polars_join
  - polars_group_by
  - fuzzy_match
  - raw_file_scan
  - api_call
  - pdf_parse
  - hardcoded_abs_path
missing_data_action: TODO_PIPELINE_VIEW_REQUIRED
