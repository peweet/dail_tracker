contract_version: 7
# Revised 2026-06-22. Profile moved from an all-sections-rendered flat scroll to
# a single-section ROUTER: ?section=<sid> (default "overview"), with an Overview
# summary-card grid as the landing and Votes promoted to the first detail tab.
# This supersedes BOTH the lazy-expander model and the later flat-render model
# described below. Driver: the flat page was too tall and the next section's
# cards bled into the viewport; Interests (rendered first + tall) buried Votes.
# spa_links replaces the whole query string on a ?-anchor click, so every
# section/filter chip carries member=, and the active section is mirrored in
# session_state so in-section filter chips don't reset to Overview.
#
# Revised 2026-05-27. Refresh covers:
#   - Architecture: 7 st.expander sections (Interests, Lobbying, Payments,
#     Attendance, Votes, Legislation, Committees). Earlier v5 contract
#     described st.tabs; the page consolidated to expanders during the
#     Phase 1–8 TheyWorkForYou lift.
#   - Stage 1 browse: card grid (clickable_card_link), not st.dataframe.
#   - Resolved TODOs cleared:
#       * v_legislation_index.sponsor_join_key — now present
#       * v_lobbying_revolving_door.unique_member_code — now present
#   - Added: Questions section + three new views (v_member_questions,
#     v_member_question_profile, v_member_question_focus_shift). Built on
#     full-history silver/questions.parquet (264k rows post May 2026
#     pagination-cap fix; was 120k truncated). See cap_fix block under
#     known_data_quality_issues.

page:
  id: member_overview
  title: "Member Overview"
  route: "utility/pages_code/member_overview.py"
  user_question: "What does the full public accountability record of this TD look like across all datasets?"
  existing_page_is: live_production_page
  entry_points:
    - card_click_on_browse_grid           # Stage 1 cards in Browse view
    - cross_page_member_card              # any /rankings-* page that links to a TD profile
    - sidebar_typeahead_filter            # find_a_td_filter in the sidebar
    - url_query_param                     # ?member=join_key — bookmarkable

data_access:
  mode: duckdb_in_process_registered_analytical_views
  persistent_duckdb_file: null
  streamlit_may_register_views: false
  streamlit_may_read_parquet: false
  connection_owner: utility/data_access/member_overview_data.py

approved_registered_views:
  # Stage 1 browse — minimal identity columns only
  stage_1_browse:
    - v_member_registry                   # unique_member_code, member_name, party_name, constituency

  # Stage 2 profile — per-domain views filtered by join_key
  stage_2_profile:
    # Identity / hero
    - v_member_registry                   # canonical TD registry
    - v_member_external_links             # Wikidata-sourced socials + Wikipedia URL

    # Attendance section
    - v_attendance_member_year_summary    # year-aggregate per TD
    - v_attendance_year_rank              # within-year rank (used for hero stat strip)

    # Votes section
    - td_vote_summary                     # one row per TD (legacy name, no v_ prefix)
    - v_vote_member_detail                # per-division rows; filter member_id + optional date range
    - v_member_debate_sections            # debate sections where the TD raised a question (used by _section_debates)

    # Questions section (new 2026-05-27)
    - v_member_questions                  # full per-question feed; filter unique_member_code, optional year/type/ministry
    - v_member_question_profile           # one row per TD: total_qs, top_ministry, top_count, top_pct, distinct_ministries
    - v_member_question_focus_shift       # 28 TDs with measurable career-brief shift between past/recent windows

    # Interests section
    - v_member_interests                  # filtered via render_member_interests helper

    # Payments section
    - v_payments_member_detail            # individual records; filter unique_member_code
    - v_payments_yearly_evolution         # pre-aggregated year summary
    - v_payments_summary                  # year filter options + summary

    # Lobbying section
    - v_lobbying_revolving_door           # now keyed on unique_member_code (resolved)
    # (full lobbying body rendered via render_member_lobbying which uses
    #  the lobbying page's own connection — separate registered views)

    # Legislation section
    - v_legislation_index                 # bills sponsored; keyed on sponsor_join_key (resolved)
    - v_statutory_instruments             # SIs signed as minister; keyed on si_minister_member_code

retrieval_sql_policy:
  allowed_statements: [SELECT]
  allowed_clauses: [WHERE, ORDER_BY, LIMIT]
  forbidden_clauses: [JOIN, GROUP_BY_MULTI_DIM, HAVING, WINDOW, CREATE_VIEW, CREATE_TABLE, INSERT, UPDATE, DELETE]
  allowed_aggregate_functions: ["COUNT(*)", "COUNT(DISTINCT col)", "MAX(col)", "MIN(col)", "SUM(col)"]
  sum_note: >
    SUM is allowed as a presentation-layer scalar (single-WHERE total, e.g.
    grand payment total per TD). Multi-dim GROUP BY remains forbidden.
  forbidden_functions: [read_parquet, parquet_scan]
  parameter_binding_required: true
  missing_data_action: TODO_PIPELINE_VIEW_REQUIRED
  stage_2_filter_pattern: "SELECT ... FROM approved_view WHERE join_key = ?"

temporal:
  mode: cross_domain_no_single_year_axis
  note: >
    Member Overview is a cross-dataset profile. Each domain section manages
    its own temporal control independently. Attendance, Payments, and
    Questions are year-scoped (st.pills); Votes uses a sidebar date range;
    Interests has its own year axis; Lobbying and Legislation are
    cross-year.
  global_year_pill: forbidden
  per_section_year_pill_pattern: st.pills (descending, most-recent default)

known_data_quality_issues:

  cap_fix_backfill:
    description: >
      Until 2026-05-27, services/urls.build_questions_urls hardcoded skip=0
      and dropped any /v1/questions response past the 1000-row server cap.
      79 of 174 TDs were silently truncated; the long-tail of older years
      (2020–2023) was the worst affected.
    effect: >
      Pre-fix: silver/questions.parquet had 120,139 rows and 79 TDs at
      exactly 1000. Post-fix: 264,657 rows, 0 TDs capped, complete history
      per TD. All three Questions views build on the post-fix dataset.
    implementation: >
      No UI action required. The fix is upstream in
      services/member_paginated.py (per-member paginate-with-skip + assert
      no silent truncation). Provenance line in the Questions section
      should say "complete history per TD" rather than the old "latest
      1000 only" caveat.

  questions_pre_2020_gap:
    description: >
      The Oireachtas API only returns questions back to 2020. Long-serving
      TDs (Aengus Ó Snodaigh elected 2002, Michael Healy-Rae 2011) have
      ~6 years of questions on file, not their full tenure.
    effect: >
      Concentration percentages and focus-shift detection are anchored to
      the 2020+ window, not the TD's full career.
    implementation: >
      Provenance line says "2020 to present" so the temporal scope is
      explicit. No claim is made about pre-2020 questions.

  v_member_overview_browse_not_built:
    description: >
      The cross-dataset browse mart (one row per TD, with attendance_rate,
      payment_total_eur, declared_interests_count, etc.) was specified in
      v5 of the contract but never built. Stage 1 browse still shows
      identity columns only.
    effect: >
      The browse grid shows name/party/constituency cards. No per-TD
      ranked metrics are visible from the index view.
    implementation: >
      Stage 1 renders cards via clickable_card_link + member_card_html.
      Cross-dataset signals surface only on the per-TD profile, not the
      browse grid.
    pipeline_todo: >
      TODO_PIPELINE_VIEW_REQUIRED: v_member_overview_browse — one row per
      TD joining attendance_member_year_summary, payments_member_detail,
      member_interests, lobbying, and legislation_index on
      unique_member_code. Out of scope for the Questions feature.

  minister_attendance_gap:
    description: >
      The Oireachtas plenary attendance PDFs do not record attendance for
      members holding ministerial office. Ministers appear as zero — not
      because they were absent, but because the source document does not
      capture their attendance.
    effect: >
      The attendance section for a minister will show low or zero counts.
    implementation: >
      The is_minister flag is shown in the attendance section with an
      inline note about the source limitation. The hero stat strip's
      "Days in chamber" cell collapses to an explanatory callout when
      BOTH attendance and payments are empty (per the existing P1-F
      audit fix).
    scope: attendance_section_only

  vote_view_aggregate_only:
    description: >
      td_vote_summary (legacy name, no v_ prefix) is aggregate per TD:
      yes_count, no_count, abstained_count, division_count, yes_rate_pct.
      Per-division rows live in v_vote_member_detail.
    implementation: >
      Use td_vote_summary for the headline stat strip. Use
      v_vote_member_detail (via the shared render_member_votes wrapper)
      for the in-section vote panel.

uses_patterns:
  - member_drilldown
  - csv_export
  - url_query_param_navigation
  - single_section_router                      # ?section=<sid>; one domain body at a time (2026-06-22)

ui_philosophy:
  framing: neutral_accountability_record
  spirit: >
    Informed by theyworkforyou.com. The user can form their own view; the
    page does not editorialise. Public record presented clearly, not a
    ranking or a verdict.
  required_patterns:
    - identity_hero_with_role_context
    - cross_dataset_headline_stats              # 3-cell stat strip
    - overview_summary_grid                     # default landing: one summary card per domain (2026-06-22)
    - single_section_router_per_domain          # ?section= switches one domain body at a time
    - empty_state_per_section
    - back_navigation_in_main_content_area
    - prev_next_member_nav                      # alphabetical TD walker in top of profile
    - clickable_card_browse_grid                # Stage 1
  forbidden_patterns:
    - hall_of_fame_shame_framing
    - medal_emojis
    - editorial_framing                         # no "top earner" or "poor attender"
    - single_metric_verdict
    - st_dataframe_on_primary_views             # cards only; dataframes for secondary drill-down

  accessibility:
    colour_policy: no_red_green_distinction
    safe_colour_pairs:
      - blue / amber-orange                     # government vs opposition
      - blue / violet-purple
      - teal / amber
      - any_of_above / neutral_grey
    forbidden_colour_pairs:
      - red / green                             # deuteranopia
    government_opposition:
      government: blue                          # never green
      opposition: amber                         # never red

streamlit_api_rules:
  html_insertion:   "st.html(...) only — never st.markdown(..., unsafe_allow_html=True)"
  button_width:     "width='stretch' — never use_container_width=True"
  toggle_filter:    "st.segmented_control — never st.radio(horizontal=True)"
  multi_visible:    "st.pills — for year nav and any multi-select with all options visible"
  vertical_space:   "st.space(n) — never st.write('') spacer"
  status_badges:    "st.badge(label, color=...) — not verbose markdown badge syntax"
  icons:            ":material/icon_name: — never emoji strings in page config or headers"
  card_background:  "background: #ffffff — never var(--surface) which is warm beige"
  dynamic_html:     "html.escape(value) on all dynamic text inserted into HTML strings"

interaction_model:
  two_stage: true
  primary_view: browse_grid                     # Stage 1
  secondary_view: per_td_profile                # Stage 2

  stage_1_browse_grid:
    layout: clickable_card_link grid via st.html
    cards_per_page: 12
    pagination: paginate + pagination_controls helpers (key_prefix="mo_browse")
    filters:
      - find_a_td_filter (search + typeahead)
      - party_pill (st.pills with All / named-parties / Other)
    cards_show:
      - member_name
      - party_name
      - constituency
      - avatar (avatar_data_url + initials fallback)

  stage_2_profile:
    prev_next_member_nav:
      placement: top of profile, above hero
      pattern: 3-button row, natural width, left-clustered

    identity_hero:
      - avatar (data URL or initials)
      - td_name (h1, dt-hero)
      - meta_line (party · constituency)
      - role_badge (TD / Minister)
      - revolving_door_badge (only if v_lobbying_revolving_door has a row)
      - external_links_row (official profile, Wikipedia, socials)

    stat_strip:
      cells:
        - days_in_chamber: "v_attendance_member_year_summary latest year + v_attendance_year_rank rank"
        - votes_cast: "td_vote_summary"
        - payments_received: "v_payments_member_detail SUM"
      empty_state: >
        When BOTH attendance and payments are empty (cabinet minister case),
        replace the 3-cell strip with a single explanatory callout.

    section_router:                             # 2026-06-22 — replaces the expander stack
      mechanism: "?section=<sid> query param (bookmarkable); spa_links soft-nav"
      session_fallback: >
        Active section mirrored in st.session_state['mo_active_section'] so
        in-section filter chips (?mo_q_topic, ?payyr) that drop ?section don't
        reset to Overview. Resets to overview when ?member changes.
      switcher: ".mo-section-nav / .mo-section-chip[aria-current] chip row"
      default: overview
      tab_order:
        - overview        # default landing — summary-card grid (_render_overview)
        - votes           # promoted to first detail tab (was 5th)
        - interests
        - lobbying
        - payments        # _render_pay_summary_tiles + render_member_payments
        - attendance
        - questions
        - debates         # own tab (was a sub-section of votes)
        - legislation     # _section_legislation + _ministerial_roles + _statutory_instruments
        - committees
      overview_cards:                           # one summary card per domain, each links into its section
        lead: votes                             # full-width, accent spine (.mo-ov-lead)
        sources: "reuse cached moq.* helpers (votes key on member_id; rest on unique_member_code)"
        degrade: "every card has an honest '—' empty path; one empty domain never breaks the grid"

    section_content:

      interests:
        renderer: render_member_interests (from pages_code/interests.py)
        params: ["Dáil", member_name, show_member_header=False, year_pill_key]

      lobbying:
        revolving_door_callout: >
          Conditional, above the lifted body. Renders when
          v_lobbying_revolving_door has a row for this unique_member_code.
        body_renderer: render_member_lobbying (from pages_code/lobbying_2.py)

      payments:
        body_renderer: render_member_payments (from pages_code/payments.py)
        params: [member_name, year_options, summary, show_member_header=False, year_pill_key]
        no_dataframe_rule: cards only (feedback_member_overview_no_dataframes)

      attendance:
        body_renderer: render_member_attendance (from pages_code/attendance.py)
        params: [member_name, show_member_header=False, year_pill_key, export_key_suffix]

      votes:
        body_renderer: render_member_votes (from utility/ui/vote_explorer.py)
        sub_section: _section_debates (debate sections where TD asked questions)
        date_range_filter: from sidebar (sidebar_date_range)

      questions:
        # NEW 2026-05-27. Hero = the question feed. Aggregate signals sit
        # in a compact header strip above the feed.
        header_strip:
          left_panel: concentration
          # "Most-questioned ministry: Health · 5,957 of 7,052 (84.5%)"
          # Source: v_member_question_profile WHERE unique_member_code = ?
          # Render full pill only when total_qs >= 100; below that, show
          # "Recently elected · 47 questions on record"
          middle_panel: total
          # "{total_qs:,} questions on file (2020–present)"
          right_panel: top_topics
          # Top 3 topics from v_member_questions WHERE unique_member_code = ?
          # GROUP BY topic ORDER BY COUNT(*) DESC LIMIT 3
          # Render as compact clickable chips that filter the feed.
          inline_subtitle: focus_shift
          # When v_member_question_focus_shift has a row for this TD:
          # "Most-questioned ministry shifted from {past_top}
          #  ({past_year_min}–{past_year_max}, {past_n} q) to {recent_top}
          #  ({recent_year_min}–{recent_year_max}, {recent_n} q)."

        filter_bar:
          year_pill: st.pills (All + descending year list from v_member_questions)
          type_toggle: st.segmented_control (All / Written / Oral)
          ministry_selectbox: st.selectbox (All ministries + per-TD distinct list)

        feed:
          source_view: v_member_questions
          filter_pattern: >
            WHERE unique_member_code = ?
              AND (? IS NULL OR question_year = ?)
              AND (? IS NULL OR question_type = ?)
              AND (? IS NULL OR ministry = ?)
          sort: question_date DESC, question_number DESC
          page_size: 10
          pagination: paginate + pagination_controls helpers
          card_content:
            - date (formatted dd MMM yyyy)
            - ministry · topic kicker
            - question_type pill (neutral; oral chip slightly heavier)
            - question_text (truncated at 280 chars with "Read full text" expand)
            - oireachtas_url link "Open on Oireachtas.ie"
            - question_ref (monospace right-aligned, [28800/26] style)

        empty_state:
          no_questions_for_td: >
            empty_state("No parliamentary questions on file",
              "This TD does not appear in the questions register for 2020 onwards.")
          filter_returns_empty: >
            empty_state("No questions match these filters",
              "Try clearing the ministry or widening the year range.")

        export:
          csv_button: "Export filtered questions (CSV)"
          respects_filters: true
          columns: [question_date, question_type, ministry, topic,
                    question_text, question_ref, oireachtas_url]

        provenance_caption: >
          "Source: oireachtas.ie/en/debates/questions/ · 2020 to present ·
          complete history per TD"

      legislation:
        bills_sponsored_body: _section_legislation
        statutory_instruments_body: _section_statutory_instruments
        condition: SIs section renders only when v_statutory_instruments
                   has rows for si_minister_member_code = ?

      committees:
        renderer: render_member_committees (from pages_code/committees.py)
        backing: _committees_load (CSV scaffold; not yet view-backed)

  navigation:
    to_profile:
      - card_click_on_browse_grid
      - cross_page_member_card_link
      - sidebar_typeahead_filter
      - url_query_param
    within_profile:
      - prev_next_member_nav        # alphabetical walker at top of profile
    from_profile:
      - back_button_in_main_content # "← All TDs"
      - clears_query_param

  sidebar:
    stage_1_only:
      - find_a_td_filter            # search + typeahead
      - party_pill_filter
    stage_2_only:
      - sidebar_date_range          # filters the Votes section only

exports:
  csv:
    enabled: true
    behaviour: current_section_or_view_only
    respects_filters: true
    does_not_recompute_dataset: true
    per_section: true               # each expander section has its own export

source_links:
  policy: per_section_inline_only
  rationale: >
    No page-level provenance footer. Each domain section may surface a
    minimal inline source caption where the source is unambiguous. The
    Questions section's caption explicitly names the new full-history
    scope ("2020 to present · complete history per TD") to retire the
    1000-row caveat that no longer applies.
  approved_url_columns:
    - oireachtas_url                # legislation rows + question rows
    - eisb_url                      # SI rows
    - external_links_row chips      # hero (Wikipedia, socials)
  display: labelled_links_not_raw_urls

ui_creativity_budget:
  level: high
  notes: >
    The page is live production. Bold redesigns are constrained by the
    Phase 1–8 TheyWorkForYou consolidation that already shipped. New
    sub-sections (Questions, SI lineage, etc.) should match the existing
    expander rhythm, side-stripe card pattern, and shared_css classes.
  may_design_boldly:
    - new_section_internal_layout       # e.g. Questions header strip
    - empty_state_copy
    - filter_bar_density
    - new_shared_css_classes_for_new_sections
  must_preserve:
    - section_ids                               # sid values stable (deep links / bookmarks)
    - overview_default_and_votes_first          # 2026-06-22 tab ordering
    - hero_treatment
    - stat_strip_3_cell_pattern
    - prev_next_member_nav
    - existing shared CSS class taxonomy (dt-*, att-*, pay-*, int-*, leg-*, lob-*)

acceptance_tests:
  cross_section:
    - back_button_at_top_of_stage2_main_content
    - prev_next_member_nav_present_and_working
    - url_query_param_loads_stage2_directly
    - section_router_defaults_to_overview
    - section_chip_carries_member_param          # spa_links replaces whole query string
    - only_active_section_body_renders
    - deep_link_member_and_section_loads_directly # ?member=X&section=votes
    - overview_card_links_switch_section
    - no_st_dataframe_on_primary_views
    - no_unsafe_allow_html
    - no_use_container_width_on_buttons
    - no_st_radio_horizontal
    - html_escape_on_all_dynamic_html_text
    - no_red_green_colour_distinction
    - no_backend_files_modified
    - no_read_parquet_or_parquet_scan
    - no_create_view_or_table
    - no_modelling_joins_or_groupby_in_streamlit

  questions_section:
    - questions_section_reachable_via_router_chip
    - header_strip_renders_concentration_total_top_topics
    - concentration_pill_hidden_below_100_questions
    - focus_shift_subtitle_renders_when_view_returns_row
    - focus_shift_subtitle_omitted_otherwise
    - feed_paginated_10_per_page_date_descending
    - year_pill_segmented_control_ministry_filter_all_present
    - filters_AND_together_in_where_clause
    - top_topic_chips_clickable_apply_filter
    - cards_use_side_stripe_via_existing_helpers
    - oral_question_type_visually_distinct
    - reference_number_right_aligned_monospace
    - oireachtas_url_opens_in_new_tab
    - csv_export_respects_filters
    - empty_state_for_no_questions_uses_empty_state_helper
    - empty_state_for_no_filter_results_uses_empty_state_helper
    - provenance_caption_says_2020_to_present_complete_history
