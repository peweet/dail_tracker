contract_version: 1
page:
  id: lobbying
  title: Lobbying Interactions
  route: utility/pages_code/lobbying_2.py
  nav_label: Lobbying
  nav_icon: 🗂️
  status: active
  priority: primary
intent:
  user_promise: Inspect lobbying records connected to public officials, lobbyists, clients, policy areas, subjects, and return
    periods.
  primary_users:
  - public
  - journalists
  - researchers
  top_questions:
  - Who is lobbying a member or office holder?
  - What policy areas appear?
  - Which clients/lobbyists appear?
design:
  aesthetic: newsroom_light
  tone: direct_civic_accountable
  css_source: utility/styles/base.css
  reuse_classes:
  - dt-hero
  - dt-kicker
  - dt-dek
  - dt-badge
  - dt-callout
  - dt-provenance-box
  layout:
    hero: editorial
    filters: sidebar
    density: compact
    mobile_strategy: stack_filters_then_table
  avoid:
  - generic_streamlit_defaults
  - purple_gradients
  - glassmorphism
  - custom_js
  - page_local_global_css
data_access:
  mode: duckdb_sql_over_pipeline_views
  database: data/gold/dail.duckdb
  view_owner: pipeline
  raw_parquet_access_in_streamlit: false
  approved_relations:
  - name: v_lobbying_interactions
    role: primary
    grain: one row per lobbying interaction as modelled by pipeline
    primary_key: lobbying_interaction_id
    required_columns:
    - lobbying_interaction_id
    - public_official_name
    - member_id
    - member_name
    - party_name
    - constituency
    - lobbyist_name
    - client_name
    - policy_area
    - subject_matter
    - communication_type
    - return_period_start_date
    - return_period_end_date
    - source_url
    - latest_fetch_timestamp_utc
    optional_columns: []
    provenance_columns:
    - latest_run_id
    - latest_fetch_timestamp_utc
    - source_summary
    - mart_version
    - code_version
  - name: v_lobbying_summary
    role: summary
    grain: one row for latest lobbying summary
    primary_key: latest_run_id
    required_columns:
    - latest_run_id
    - lobbying_records_count
    - lobbyists_count
    - clients_count
    - public_officials_count
    - latest_return_period_end_date
    optional_columns: []
    provenance_columns:
    - latest_run_id
    - latest_fetch_timestamp_utc
    - source_summary
    - mart_version
    - code_version
  - name: v_lobbying_policy_area_summary
    role: chart
    grain: one row per policy area
    primary_key: policy_area
    required_columns:
    - policy_area
    - records_count
    optional_columns: []
    provenance_columns:
    - latest_run_id
    - latest_fetch_timestamp_utc
    - source_summary
    - mart_version
    - code_version
sql_policy:
  claude_may_generate_sql: true
  sql_kind_allowed: retrieval_only
  parameterized_queries_required: true
  explicit_column_projection_required: true
  allowed_statements:
  - SELECT
  forbidden_sql:
  - JOIN
  - GROUP_BY
  - HAVING
  - WINDOW
  - CTE_FOR_MODELLING
  - CREATE
  - INSERT
  - UPDATE
  - DELETE
  - read_parquet
  - parquet_scan
  allowed_filter_columns:
    public_official_name:
      operators:
      - ILIKE
      parameterized: true
    lobbyist_name:
      operators:
      - ILIKE
      parameterized: true
    client_name:
      operators:
      - ILIKE
      parameterized: true
    policy_area:
      operators:
      - IN
      parameterized: true
    communication_type:
      operators:
      - IN
      parameterized: true
    return_period_end_date:
      operators:
      - BETWEEN
      parameterized: true
  allowed_sort_columns:
  - public_official_name
  - member_name
  - party_name
  - constituency
  - lobbyist_name
  - client_name
  - policy_area
  - subject_matter
  - communication_type
  - return_period_end_date
  - source_url
  max_rows_default: 1000
  max_rows_hard_limit: 10000
  missing_capability_action: TODO_PIPELINE_VIEW_REQUIRED
filters:
- name: official_search
  label: Search official/member
  type: text_search
  column: public_official_name
  operator: ILIKE
  source: typed_input
  essential: true
  default: ''
  help: ''
- name: lobbyist_search
  label: Search lobbyist
  type: text_search
  column: lobbyist_name
  operator: ILIKE
  source: typed_input
  essential: true
  default: ''
  help: ''
- name: client_search
  label: Search client
  type: text_search
  column: client_name
  operator: ILIKE
  source: typed_input
  essential: false
  default: ''
  help: ''
- name: policy_area
  label: Policy area
  type: multiselect
  column: policy_area
  operator: IN
  source: distinct_values_query
  essential: true
  default: []
  help: ''
- name: communication_type
  label: Communication type
  type: multiselect
  column: communication_type
  operator: IN
  source: distinct_values_query
  essential: false
  default: []
  help: ''
- name: return_period
  label: Return period
  type: date_range
  column: return_period_end_date
  operator: BETWEEN
  source: typed_input
  essential: true
  default: ''
  help: ''
metrics:
- name: visible_lobbying_records
  label: Visible records
  source: ui_result_count
  relation: v_lobbying_interactions
  column: null
  format: integer
  filtered: true
  ui_aggregation_allowed: true
- name: lobbying_records_count
  label: Lobbying records
  source: pipeline_summary_view
  relation: v_lobbying_summary
  column: lobbying_records_count
  format: integer
  filtered: false
  ui_aggregation_allowed: false
- name: lobbyists_count
  label: Lobbyists
  source: pipeline_summary_view
  relation: v_lobbying_summary
  column: lobbyists_count
  format: integer
  filtered: false
  ui_aggregation_allowed: false
visuals:
- name: lobbying_by_policy_area
  type: bar
  relation: v_lobbying_policy_area_summary
  x: policy_area
  y: records_count
  color: null
  purpose: Show records by policy area from pipeline summary.
  required: false
tables:
- name: lobbying_table
  relation: v_lobbying_interactions
  role: evidence
  default_sort_by: return_period_end_date
  default_sort_direction: desc
  columns:
  - name: public_official_name
    label: Official
    type: text
    visible: true
    width: medium
    help: null
  - name: member_name
    label: Matched member
    type: text
    visible: true
    width: medium
    help: null
  - name: party_name
    label: Party
    type: text
    visible: true
    width: small
    help: null
  - name: constituency
    label: Constituency
    type: text
    visible: true
    width: medium
    help: null
  - name: lobbyist_name
    label: Lobbyist
    type: text
    visible: true
    width: medium
    help: null
  - name: client_name
    label: Client
    type: text
    visible: true
    width: medium
    help: null
  - name: policy_area
    label: Policy area
    type: text
    visible: true
    width: medium
    help: null
  - name: subject_matter
    label: Subject
    type: long_text
    visible: true
    width: large
    help: null
  - name: communication_type
    label: Type
    type: text
    visible: true
    width: small
    help: null
  - name: return_period_end_date
    label: Period end
    type: date
    visible: true
    width: small
    help: null
  - name: source_url
    label: Source
    type: url
    visible: true
    width: medium
    help: null
exports:
  enabled: true
  formats:
  - csv
  filename_pattern: dail_tracker_lobbying_{date}.csv
  export_scope: displayed_rows_only
provenance:
  show_panel: true
  required_fields:
  - latest_run_id
  - latest_fetch_timestamp_utc
  - source_summary
  - mart_version
  - code_version
  caveat_text: Lobbying records are based on processed lobbying.ie exports. Member matching is pipeline-owned.
empty_states:
- condition: no_rows
  title: No lobbying records match these filters
  body: Try clearing one or more filters.
  recovery_hint: Clear filters or refresh the pipeline outputs.
- condition: missing_relation
  title: Lobbying Interactions view is missing
  body: The approved relation `v_lobbying_interactions` is not available in DuckDB.
  recovery_hint: Run the pipeline or implement the required view.
- condition: missing_columns
  title: View shape changed
  body: Required columns are missing from the approved relation.
  recovery_hint: Align the pipeline view and YAML contract.
out_of_scope:
- Do not match lobbying officials to members in Streamlit.
- Do not group policy areas in Streamlit unless using a summary view.
- Do not infer lobbying intent or sentiment.
logic_firewall:
  forbidden_python:
  - pandas_merge
  - pandas_join
  - pandas_groupby
  - pandas_pivot
  - polars_join
  - polars_group_by
  - fuzzy_match
  - raw_file_scan
  - api_call
  - pdf_parse
  - hardcoded_abs_path
  allowed_python:
  - render
  - format
  - parameter_binding
  - dataframe_column_selection
  - csv_export
  - empty_state
  missing_data_action: TODO_PIPELINE_VIEW_REQUIRED
acceptance_tests:
- Page file contains no merge, join, groupby, pivot, fuzzy matching, API calls, PDF parsing, raw Parquet scans, or hardcoded
  absolute local paths.
- SQL uses only approved relations, columns, filters, sort columns, and limits from this contract.
- Required columns are validated before rendering the table.
- CSV export contains only currently displayed rows.
- Provenance panel renders when required fields are available.
