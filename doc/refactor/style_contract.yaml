brand:
  name: dail_tracker
  tone: "direct, civic, accountable"
  vibe: "editorial accountability journalism"

theme:
  preset: "newsroom_light"
  primary_color: "#0F3D5E"
  accent_color: "#9A3412"
  background: "#F8F7F4"
  surface: "#FFFFFF"
  border: "#D6D3D1"
  text_primary: "#111827"
  text_muted: "#6B7280"

typography:
  heading_font: "Source Serif 4"
  body_font: "Inter"
  mono_font: "JetBrains Mono"
  h1_size: "2.2rem"
  h2_size: "1.5rem"
  body_size: "0.98rem"
  table_density: "compact"

layout:
  page_max_width: "1280px"
  hero_style: "headline + short dek"
  filters_position: "sidebar"
  metrics_layout: "4-up cards"
  table_priority: "high"
  provenance_position: "below table"

components:
  metric_card: "minimal_border"
  table_style: "editorial_dense"
  chart_style: "muted_reference"
  button_style: "quiet_primary"

anti_patterns:
  - "no glassmorphism"
  - "no gradient text"
  - "no nested cards"
  - "no decorative icons unless meaningful"
  - "no low-contrast secondary text"