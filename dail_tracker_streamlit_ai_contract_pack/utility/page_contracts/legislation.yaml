contract_version: 1
page:
  id: legislation
  title: Bills and Legislation
  route: utility/pages_code/legislation.py
  nav_label: Legislation
  nav_icon: 📜
  status: planned
  priority: secondary
intent:
  user_promise: Inspect bills, sponsors, stages, dates, and statuses without flattening bill JSON in Streamlit.
  primary_users:
  - public
  - journalists
  - researchers
  top_questions:
  - Which bills are associated with a member?
  - What stage/status is a bill at?
  - Who sponsored it?
design:
  aesthetic: newsroom_light
  tone: direct_civic_accountable
  css_source: utility/styles/base.css
  reuse_classes:
  - dt-hero
  - dt-kicker
  - dt-dek
  - dt-badge
  - dt-callout
  - dt-provenance-box
  layout:
    hero: editorial
    filters: sidebar
    density: compact
    mobile_strategy: stack_filters_then_table
  avoid:
  - generic_streamlit_defaults
  - purple_gradients
  - glassmorphism
  - custom_js
  - page_local_global_css
data_access:
  mode: duckdb_sql_over_pipeline_views
  database: data/gold/dail.duckdb
  view_owner: pipeline
  raw_parquet_access_in_streamlit: false
  approved_relations:
  - name: v_legislation_bills
    role: primary
    grain: one row per bill sponsor/stage record
    primary_key: bill_record_id
    required_columns:
    - bill_record_id
    - bill_id
    - bill_title
    - bill_number
    - bill_year
    - bill_status
    - bill_stage
    - stage_date
    - sponsor_member_id
    - sponsor_member_name
    - sponsor_party_name
    - sponsor_constituency
    - source_url
    - latest_fetch_timestamp_utc
    optional_columns: []
    provenance_columns:
    - latest_run_id
    - latest_fetch_timestamp_utc
    - source_summary
    - mart_version
    - code_version
  - name: v_legislation_summary
    role: summary
    grain: one row for latest legislation summary
    primary_key: latest_run_id
    required_columns:
    - latest_run_id
    - bills_count
    - sponsors_count
    - latest_stage_date
    optional_columns: []
    provenance_columns:
    - latest_run_id
    - latest_fetch_timestamp_utc
    - source_summary
    - mart_version
    - code_version
sql_policy:
  claude_may_generate_sql: true
  sql_kind_allowed: retrieval_only
  parameterized_queries_required: true
  explicit_column_projection_required: true
  allowed_statements:
  - SELECT
  forbidden_sql:
  - JOIN
  - GROUP_BY
  - HAVING
  - WINDOW
  - CTE_FOR_MODELLING
  - CREATE
  - INSERT
  - UPDATE
  - DELETE
  - read_parquet
  - parquet_scan
  allowed_filter_columns:
    bill_title:
      operators:
      - ILIKE
      parameterized: true
    sponsor_member_name:
      operators:
      - ILIKE
      parameterized: true
    bill_year:
      operators:
      - IN
      parameterized: true
    bill_status:
      operators:
      - IN
      parameterized: true
    bill_stage:
      operators:
      - IN
      parameterized: true
  allowed_sort_columns:
  - bill_title
  - bill_number
  - bill_year
  - bill_status
  - bill_stage
  - stage_date
  - sponsor_member_name
  - sponsor_party_name
  - sponsor_constituency
  - source_url
  max_rows_default: 1000
  max_rows_hard_limit: 10000
  missing_capability_action: TODO_PIPELINE_VIEW_REQUIRED
filters:
- name: bill_search
  label: Search bill
  type: text_search
  column: bill_title
  operator: ILIKE
  source: typed_input
  essential: true
  default: ''
  help: ''
- name: sponsor_search
  label: Search sponsor
  type: text_search
  column: sponsor_member_name
  operator: ILIKE
  source: typed_input
  essential: true
  default: ''
  help: ''
- name: bill_year
  label: Bill year
  type: multiselect
  column: bill_year
  operator: IN
  source: distinct_values_query
  essential: true
  default: []
  help: ''
- name: bill_status
  label: Status
  type: multiselect
  column: bill_status
  operator: IN
  source: distinct_values_query
  essential: true
  default: []
  help: ''
- name: bill_stage
  label: Stage
  type: multiselect
  column: bill_stage
  operator: IN
  source: distinct_values_query
  essential: false
  default: []
  help: ''
metrics:
- name: visible_bill_records
  label: Visible bill records
  source: ui_result_count
  relation: v_legislation_bills
  column: null
  format: integer
  filtered: true
  ui_aggregation_allowed: true
- name: bills_count
  label: Bills
  source: pipeline_summary_view
  relation: v_legislation_summary
  column: bills_count
  format: integer
  filtered: false
  ui_aggregation_allowed: false
- name: latest_stage_date
  label: Latest stage
  source: pipeline_summary_view
  relation: v_legislation_summary
  column: latest_stage_date
  format: date
  filtered: false
  ui_aggregation_allowed: false
visuals: []
tables:
- name: legislation_table
  relation: v_legislation_bills
  role: evidence
  default_sort_by: stage_date
  default_sort_direction: desc
  columns:
  - name: bill_title
    label: Bill
    type: text
    visible: true
    width: large
    help: null
  - name: bill_number
    label: No.
    type: text
    visible: true
    width: small
    help: null
  - name: bill_year
    label: Year
    type: integer
    visible: true
    width: small
    help: null
  - name: bill_status
    label: Status
    type: text
    visible: true
    width: medium
    help: null
  - name: bill_stage
    label: Stage
    type: text
    visible: true
    width: medium
    help: null
  - name: stage_date
    label: Stage date
    type: date
    visible: true
    width: small
    help: null
  - name: sponsor_member_name
    label: Sponsor
    type: text
    visible: true
    width: medium
    help: null
  - name: sponsor_party_name
    label: Party
    type: text
    visible: true
    width: small
    help: null
  - name: sponsor_constituency
    label: Constituency
    type: text
    visible: true
    width: medium
    help: null
  - name: source_url
    label: Source
    type: url
    visible: true
    width: medium
    help: null
exports:
  enabled: true
  formats:
  - csv
  filename_pattern: dail_tracker_legislation_{date}.csv
  export_scope: displayed_rows_only
provenance:
  show_panel: true
  required_fields:
  - latest_run_id
  - latest_fetch_timestamp_utc
  - source_summary
  - mart_version
  - code_version
  caveat_text: Bills and stages are modelled by the pipeline from source data.
empty_states:
- condition: no_rows
  title: No legislation records match these filters
  body: Try clearing one or more filters.
  recovery_hint: Clear filters or refresh the pipeline outputs.
- condition: missing_relation
  title: Bills and Legislation view is missing
  body: The approved relation `v_legislation_bills` is not available in DuckDB.
  recovery_hint: Run the pipeline or implement the required view.
- condition: missing_columns
  title: View shape changed
  body: Required columns are missing from the approved relation.
  recovery_hint: Align the pipeline view and YAML contract.
out_of_scope:
- Do not flatten bill JSON in Streamlit.
- Do not query Oireachtas APIs in Streamlit.
- Do not infer bill status/sponsor in Streamlit.
logic_firewall:
  forbidden_python:
  - pandas_merge
  - pandas_join
  - pandas_groupby
  - pandas_pivot
  - polars_join
  - polars_group_by
  - fuzzy_match
  - raw_file_scan
  - api_call
  - pdf_parse
  - hardcoded_abs_path
  allowed_python:
  - render
  - format
  - parameter_binding
  - dataframe_column_selection
  - csv_export
  - empty_state
  missing_data_action: TODO_PIPELINE_VIEW_REQUIRED
acceptance_tests:
- Page file contains no merge, join, groupby, pivot, fuzzy matching, API calls, PDF parsing, raw Parquet scans, or hardcoded
  absolute local paths.
- SQL uses only approved relations, columns, filters, sort columns, and limits from this contract.
- Required columns are validated before rendering the table.
- CSV export contains only currently displayed rows.
- Provenance panel renders when required fields are available.
