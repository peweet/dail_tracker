contract_version: 1
page:
  id: attendance
  title: Dáil Attendance Tracker
  route: utility/pages_code/attendance.py
  nav_label: Attendance
  nav_icon: 📅
  status: active
  priority: primary
intent:
  user_promise: Inspect attendance rates, absences, sitting counts, and date coverage without recomputing attendance in the
    UI.
  primary_users:
  - public
  - journalists
  - researchers
  top_questions:
  - How often does a member attend?
  - Which members have lower attendance rates?
  - What sitting range is represented?
design:
  aesthetic: newsroom_light
  tone: direct_civic_accountable
  css_source: utility/styles/base.css
  reuse_classes:
  - dt-hero
  - dt-kicker
  - dt-dek
  - dt-badge
  - dt-callout
  - dt-provenance-box
  layout:
    hero: editorial
    filters: sidebar
    density: compact
    mobile_strategy: stack_filters_then_table
  avoid:
  - generic_streamlit_defaults
  - purple_gradients
  - glassmorphism
  - custom_js
  - page_local_global_css
data_access:
  mode: duckdb_sql_over_pipeline_views
  database: data/gold/dail.duckdb
  view_owner: pipeline
  raw_parquet_access_in_streamlit: false
  approved_relations:
  - name: v_attendance_member_summary
    role: primary
    grain: one row per member per parliamentary period
    primary_key: member_id
    required_columns:
    - member_id
    - member_name
    - party_name
    - constituency
    - attended_count
    - absent_count
    - sitting_count
    - attendance_rate
    - first_sitting_date
    - last_sitting_date
    - latest_fetch_timestamp_utc
    optional_columns: []
    provenance_columns:
    - latest_run_id
    - latest_fetch_timestamp_utc
    - source_summary
    - mart_version
    - code_version
  - name: v_attendance_timeline
    role: chart
    grain: one row per member per sitting date
    primary_key: attendance_timeline_id
    required_columns:
    - attendance_timeline_id
    - sitting_date
    - member_id
    - member_name
    - present_flag
    - attendance_status
    - party_name
    - constituency
    optional_columns: []
    provenance_columns:
    - latest_run_id
    - latest_fetch_timestamp_utc
    - source_summary
    - mart_version
    - code_version
  - name: v_attendance_summary
    role: summary
    grain: one row for latest attendance summary
    primary_key: latest_run_id
    required_columns:
    - latest_run_id
    - members_count
    - sitting_count
    - avg_attendance_rate
    - first_sitting_date
    - last_sitting_date
    optional_columns: []
    provenance_columns:
    - latest_run_id
    - latest_fetch_timestamp_utc
    - source_summary
    - mart_version
    - code_version
sql_policy:
  claude_may_generate_sql: true
  sql_kind_allowed: retrieval_only
  parameterized_queries_required: true
  explicit_column_projection_required: true
  allowed_statements:
  - SELECT
  forbidden_sql:
  - JOIN
  - GROUP_BY
  - HAVING
  - WINDOW
  - CTE_FOR_MODELLING
  - CREATE
  - INSERT
  - UPDATE
  - DELETE
  - read_parquet
  - parquet_scan
  allowed_filter_columns:
    member_name:
      operators:
      - ILIKE
      parameterized: true
    party_name:
      operators:
      - IN
      parameterized: true
    constituency:
      operators:
      - IN
      parameterized: true
    attendance_rate:
      operators:
      - BETWEEN
      parameterized: true
    sitting_date:
      operators:
      - BETWEEN
      parameterized: true
  allowed_sort_columns:
  - member_name
  - party_name
  - constituency
  - attendance_rate
  - attended_count
  - absent_count
  - sitting_count
  - first_sitting_date
  - last_sitting_date
  max_rows_default: 1000
  max_rows_hard_limit: 1000
  missing_capability_action: TODO_PIPELINE_VIEW_REQUIRED
filters:
- name: member_search
  label: Search member
  type: text_search
  column: member_name
  operator: ILIKE
  source: typed_input
  essential: true
  default: ''
  help: ''
- name: party_name
  label: Party
  type: multiselect
  column: party_name
  operator: IN
  source: distinct_values_query
  essential: true
  default: []
  help: ''
- name: constituency
  label: Constituency
  type: multiselect
  column: constituency
  operator: IN
  source: distinct_values_query
  essential: false
  default: []
  help: ''
- name: attendance_rate_range
  label: Attendance rate
  type: number_range
  column: attendance_rate
  operator: BETWEEN
  source: typed_input
  essential: true
  default: ''
  help: ''
- name: sitting_date_range
  label: Sitting date range
  type: date_range
  column: sitting_date
  operator: BETWEEN
  source: typed_input
  essential: false
  default: ''
  help: ''
metrics:
- name: visible_members
  label: Visible members
  source: ui_result_count
  relation: v_attendance_member_summary
  column: null
  format: integer
  filtered: true
  ui_aggregation_allowed: true
- name: avg_attendance_rate
  label: Avg attendance
  source: pipeline_summary_view
  relation: v_attendance_summary
  column: avg_attendance_rate
  format: percent
  filtered: false
  ui_aggregation_allowed: false
- name: sitting_count
  label: Sittings
  source: pipeline_summary_view
  relation: v_attendance_summary
  column: sitting_count
  format: integer
  filtered: false
  ui_aggregation_allowed: false
visuals:
- name: attendance_timeline
  type: line
  relation: v_attendance_timeline
  x: sitting_date
  y: present_flag
  color: member_name
  purpose: Show sitting-level evidence for selected member(s).
  required: false
tables:
- name: attendance_table
  relation: v_attendance_member_summary
  role: evidence
  default_sort_by: attendance_rate
  default_sort_direction: asc
  columns:
  - name: member_name
    label: Member
    type: text
    visible: true
    width: medium
    help: null
  - name: party_name
    label: Party
    type: text
    visible: true
    width: small
    help: null
  - name: constituency
    label: Constituency
    type: text
    visible: true
    width: medium
    help: null
  - name: attendance_rate
    label: Attendance
    type: percent
    visible: true
    width: small
    help: null
  - name: attended_count
    label: Present
    type: integer
    visible: true
    width: small
    help: null
  - name: absent_count
    label: Absent
    type: integer
    visible: true
    width: small
    help: null
  - name: sitting_count
    label: Sittings
    type: integer
    visible: true
    width: small
    help: null
  - name: first_sitting_date
    label: First sitting
    type: date
    visible: true
    width: small
    help: null
  - name: last_sitting_date
    label: Last sitting
    type: date
    visible: true
    width: small
    help: null
exports:
  enabled: true
  formats:
  - csv
  filename_pattern: dail_tracker_attendance_{date}.csv
  export_scope: displayed_rows_only
provenance:
  show_panel: true
  required_fields:
  - latest_run_id
  - latest_fetch_timestamp_utc
  - source_summary
  - mart_version
  - code_version
  caveat_text: Attendance rates and denominators are owned by the pipeline and must not be recalculated in Streamlit.
empty_states:
- condition: no_rows
  title: No attendance records match these filters
  body: Try clearing one or more filters.
  recovery_hint: Clear filters or refresh the pipeline outputs.
- condition: missing_relation
  title: Dáil Attendance Tracker view is missing
  body: The approved relation `v_attendance_member_summary` is not available in DuckDB.
  recovery_hint: Run the pipeline or implement the required view.
- condition: missing_columns
  title: View shape changed
  body: Required columns are missing from the approved relation.
  recovery_hint: Align the pipeline view and YAML contract.
out_of_scope:
- Do not compute attendance rates in Streamlit.
- Do not parse attendance PDFs in Streamlit.
logic_firewall:
  forbidden_python:
  - pandas_merge
  - pandas_join
  - pandas_groupby
  - pandas_pivot
  - polars_join
  - polars_group_by
  - fuzzy_match
  - raw_file_scan
  - api_call
  - pdf_parse
  - hardcoded_abs_path
  allowed_python:
  - render
  - format
  - parameter_binding
  - dataframe_column_selection
  - csv_export
  - empty_state
  missing_data_action: TODO_PIPELINE_VIEW_REQUIRED
acceptance_tests:
- Page file contains no merge, join, groupby, pivot, fuzzy matching, API calls, PDF parsing, raw Parquet scans, or hardcoded
  absolute local paths.
- SQL uses only approved relations, columns, filters, sort columns, and limits from this contract.
- Required columns are validated before rendering the table.
- CSV export contains only currently displayed rows.
- Provenance panel renders when required fields are available.
