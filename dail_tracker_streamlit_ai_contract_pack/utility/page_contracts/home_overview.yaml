contract_version: 1
page:
  id: home_overview
  title: Oireachtas Explorer
  route: utility/pages_code/home.py
  nav_label: Overview
  nav_icon: 🏛️
  status: planned
  priority: primary
intent:
  user_promise: Orient first-time users to the datasets and route them to the most useful evidence page.
  primary_users:
  - public
  - journalists
  - researchers
  top_questions:
  - What can I investigate here?
  - Which dataset should I open first?
  - How fresh is the data?
design:
  aesthetic: newsroom_light
  tone: direct_civic_accountable
  css_source: utility/styles/base.css
  reuse_classes:
  - dt-hero
  - dt-kicker
  - dt-dek
  - dt-badge
  - dt-callout
  - dt-provenance-box
  layout:
    hero: editorial
    filters: sidebar
    density: compact
    mobile_strategy: stack_filters_then_table
  avoid:
  - generic_streamlit_defaults
  - purple_gradients
  - glassmorphism
  - custom_js
  - page_local_global_css
data_access:
  mode: duckdb_sql_over_pipeline_views
  database: data/gold/dail.duckdb
  view_owner: pipeline
  raw_parquet_access_in_streamlit: false
  approved_relations:
  - name: v_app_dataset_cards
    role: primary
    grain: one row per dataset/page
    primary_key: dataset_id
    required_columns:
    - dataset_id
    - dataset_name
    - nav_label
    - description
    - political_significance
    - freshness_label
    - route_hint
    - display_order
    optional_columns: []
    provenance_columns:
    - latest_run_id
    - latest_fetch_timestamp_utc
    - source_summary
    - mart_version
    - code_version
  - name: v_app_overview_summary
    role: summary
    grain: one row per latest run
    primary_key: latest_run_id
    required_columns:
    - latest_run_id
    - latest_fetch_timestamp_utc
    - members_count
    - interests_count
    - attendance_records_count
    - committee_assignments_count
    - payments_records_count
    - lobbying_returns_count
    - votes_count
    - bills_count
    optional_columns: []
    provenance_columns:
    - latest_run_id
    - latest_fetch_timestamp_utc
    - source_summary
    - mart_version
    - code_version
sql_policy:
  claude_may_generate_sql: true
  sql_kind_allowed: retrieval_only
  parameterized_queries_required: true
  explicit_column_projection_required: true
  allowed_statements:
  - SELECT
  forbidden_sql:
  - JOIN
  - GROUP_BY
  - HAVING
  - WINDOW
  - CTE_FOR_MODELLING
  - CREATE
  - INSERT
  - UPDATE
  - DELETE
  - read_parquet
  - parquet_scan
  allowed_filter_columns: {}
  allowed_sort_columns:
  - dataset_name
  - description
  - political_significance
  - freshness_label
  - route_hint
  max_rows_default: 100
  max_rows_hard_limit: 100
  missing_capability_action: TODO_PIPELINE_VIEW_REQUIRED
filters: []
metrics:
- name: members_count
  label: Members
  source: pipeline_summary_view
  relation: v_app_overview_summary
  column: members_count
  format: integer
  filtered: false
  ui_aggregation_allowed: false
- name: interests_count
  label: Interest declarations
  source: pipeline_summary_view
  relation: v_app_overview_summary
  column: interests_count
  format: integer
  filtered: false
  ui_aggregation_allowed: false
- name: lobbying_returns_count
  label: Lobbying returns
  source: pipeline_summary_view
  relation: v_app_overview_summary
  column: lobbying_returns_count
  format: integer
  filtered: false
  ui_aggregation_allowed: false
visuals: []
tables:
- name: home_overview_table
  relation: v_app_dataset_cards
  role: evidence
  default_sort_by: display_order
  default_sort_direction: asc
  columns:
  - name: dataset_name
    label: Dataset
    type: text
    visible: true
    width: medium
    help: null
  - name: description
    label: What it shows
    type: long_text
    visible: true
    width: large
    help: null
  - name: political_significance
    label: Why it matters
    type: long_text
    visible: true
    width: large
    help: null
  - name: freshness_label
    label: Freshness
    type: text
    visible: true
    width: small
    help: null
  - name: route_hint
    label: Open
    type: text
    visible: true
    width: small
    help: null
exports:
  enabled: true
  formats:
  - csv
  filename_pattern: dail_tracker_home_overview_{date}.csv
  export_scope: displayed_rows_only
provenance:
  show_panel: true
  required_fields:
  - latest_run_id
  - latest_fetch_timestamp_utc
  - source_summary
  - mart_version
  - code_version
  caveat_text: Overview reflects the latest successful pipeline run. Dataset freshness may differ by source.
empty_states:
- condition: no_rows
  title: No overview records match these filters
  body: Try clearing one or more filters.
  recovery_hint: Clear filters or refresh the pipeline outputs.
- condition: missing_relation
  title: Oireachtas Explorer view is missing
  body: The approved relation `v_app_dataset_cards` is not available in DuckDB.
  recovery_hint: Run the pipeline or implement the required view.
- condition: missing_columns
  title: View shape changed
  body: Required columns are missing from the approved relation.
  recovery_hint: Align the pipeline view and YAML contract.
out_of_scope:
- Do not build a chatbot.
- Do not add AI political summaries.
- Do not add maps.
logic_firewall:
  forbidden_python:
  - pandas_merge
  - pandas_join
  - pandas_groupby
  - pandas_pivot
  - polars_join
  - polars_group_by
  - fuzzy_match
  - raw_file_scan
  - api_call
  - pdf_parse
  - hardcoded_abs_path
  allowed_python:
  - render
  - format
  - parameter_binding
  - dataframe_column_selection
  - csv_export
  - empty_state
  missing_data_action: TODO_PIPELINE_VIEW_REQUIRED
acceptance_tests:
- Page file contains no merge, join, groupby, pivot, fuzzy matching, API calls, PDF parsing, raw Parquet scans, or hardcoded
  absolute local paths.
- SQL uses only approved relations, columns, filters, sort columns, and limits from this contract.
- Required columns are validated before rendering the table.
- CSV export contains only currently displayed rows.
- Provenance panel renders when required fields are available.
