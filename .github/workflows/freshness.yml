name: Data freshness

# Read-only staleness CANARY. Reads the committed data/_meta/freshness.json and
# reports how old the deployed data is — i.e. when the pipeline last produced
# data. It does NOT refresh anything: making data fresh requires running
# pipeline.py (the deferred cloud-automation work — see doc/CI_CD.md Phase 6).
#
# Alerts on the AGE OF THE PIPELINE RUN (freshness.json generated_at), not on
# per-dataset record dates — those go quiet legitimately during Dáil recess.
# On a scheduled run, if the pipeline hasn't produced fresh data within the
# threshold, this opens a tracking issue (same pattern as audit.yml/nightly.yml).
# It is schedule-only: it never blocks a PR.

on:
  schedule:
    - cron: "0 8 * * 1,4"   # Mon & Thu 08:00 UTC
  workflow_dispatch:
    inputs:
      max_age_days:
        description: "Alert if the pipeline last ran more than this many days ago"
        required: false
        default: "14"

permissions:
  contents: read
  issues: write

jobs:
  freshness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Pure stdlib — no dependency install needed; it only reads committed JSON.
      - name: Report data freshness
        env:
          FRESHNESS_MAX_AGE_DAYS: ${{ github.event.inputs.max_age_days || '14' }}
        run: python tools/freshness_report.py
      # Per-lane refresh ledger: shows whether each independently-scheduled lane (cloud
      # Actions + local task) beat on time. Informational for now (no --strict) so it reports
      # the picture without opening issues while the lanes start beating. Flip to
      # `--strict` once every lane is confirmed beating to make a stalled lane fail the canary.
      - name: Report refresh-lane freshness
        if: always()
        run: python tools/freshness_status.py
      # Watch the ORPHAN procurement publishers (NTA/NPHDB/SEAI/depts) — bespoke
      # parsers NOT in pipeline.py, so a new quarter upstream goes unnoticed and gold
      # stays stale. Network probe; --no-beat (a read-only checkout can't persist the
      # heartbeat) and `|| true` so a flaky external site never breaks the canary.
      - name: Poll orphan procurement sources
        id: procpoll
        if: always()
        run: |
          python tools/procurement_source_poller.py --no-beat --json > poll.json || true
          python - <<'PY'
          import json, os
          try:
              r = json.load(open("poll.json"))
          except Exception:
              r = {"sources": [], "fresh_sources": []}
          for s in r["sources"]:
              print(f"  {s['id']:<22}{s['status']}")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write("fresh=" + ",".join(r.get("fresh_sources", [])) + "\n")
          PY
      - name: Open issue on fresh procurement data (scheduled runs only)
        if: github.event_name == 'schedule' && steps.procpoll.outputs.fresh != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fresh = "${{ steps.procpoll.outputs.fresh }}";
            github.rest.issues.create({
              ...context.repo,
              title: `Procurement: fresh upstream data to ingest (${fresh})`,
              body: `The orphan-source poller found newer periods upstream than we hold for: **${fresh}**.\n\nThese publishers are ingested by bespoke parsers NOT in \`pipeline.py\`, so gold will stay stale until each is re-run and re-promoted. See \`data/_meta/procurement_source_poll.json\` (job artifact) for the exact periods.\n\nTo refresh: run the relevant parser (e.g. \`extractors/procurement_nphdb_parser.py\`), then \`procurement_payments_consolidate.py\`, then bump \`held_through\` in \`tools/procurement_source_poller.py\`.\n\nJob log: ${context.payload.repository.html_url}/actions/runs/${context.runId}`,
              labels: ["data", "procurement"],
            });
      - name: Open issue on staleness (scheduled runs only)
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              ...context.repo,
              title: `Data freshness: deployed data looks stale (${new Date().toISOString().slice(0, 10)})`,
              body: `The committed \`data/_meta/freshness.json\` shows the pipeline has not produced fresh data within the threshold.\n\nJob log: ${context.payload.repository.html_url}/actions/runs/${context.runId}\n\nThis is a staleness *canary* ("did the pipeline stop running?"), not proof of missed upstream data. To refresh: run \`pipeline.py\` locally and commit the updated gold parquet + \`data/_meta/freshness.json\`.`,
              labels: ["data", "freshness"],
            });
