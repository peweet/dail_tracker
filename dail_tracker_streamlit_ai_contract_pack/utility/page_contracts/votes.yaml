contract_version: 1
page:
  id: votes
  title: Dáil Votes
  route: utility/pages_code/votes.py
  nav_label: Votes
  nav_icon: 🗳️
  status: active
  priority: secondary
intent:
  user_promise: Inspect division/vote records by member, party, date, vote position, and question without modelling votes
    in the UI.
  primary_users:
  - public
  - journalists
  - researchers
  top_questions:
  - How did a member vote?
  - What was the division/question?
  - What was the result?
design:
  aesthetic: newsroom_light
  tone: direct_civic_accountable
  css_source: utility/styles/base.css
  reuse_classes:
  - dt-hero
  - dt-kicker
  - dt-dek
  - dt-badge
  - dt-callout
  - dt-provenance-box
  layout:
    hero: editorial
    filters: sidebar
    density: compact
    mobile_strategy: stack_filters_then_table
  avoid:
  - generic_streamlit_defaults
  - purple_gradients
  - glassmorphism
  - custom_js
  - page_local_global_css
data_access:
  mode: duckdb_sql_over_pipeline_views
  database: data/gold/dail.duckdb
  view_owner: pipeline
  raw_parquet_access_in_streamlit: false
  approved_relations:
  - name: v_member_votes
    role: primary
    grain: one row per member per division vote
    primary_key: member_vote_id
    required_columns:
    - member_vote_id
    - division_id
    - vote_date
    - vote_title
    - vote_question
    - vote_result
    - member_id
    - member_name
    - party_name
    - constituency
    - vote_position
    - house
    - source_url
    - latest_fetch_timestamp_utc
    optional_columns: []
    provenance_columns:
    - latest_run_id
    - latest_fetch_timestamp_utc
    - source_summary
    - mart_version
    - code_version
  - name: v_votes_summary
    role: summary
    grain: one row for latest votes summary
    primary_key: latest_run_id
    required_columns:
    - latest_run_id
    - divisions_count
    - member_vote_records_count
    - latest_vote_date
    optional_columns: []
    provenance_columns:
    - latest_run_id
    - latest_fetch_timestamp_utc
    - source_summary
    - mart_version
    - code_version
sql_policy:
  claude_may_generate_sql: true
  sql_kind_allowed: retrieval_only
  parameterized_queries_required: true
  explicit_column_projection_required: true
  allowed_statements:
  - SELECT
  forbidden_sql:
  - JOIN
  - GROUP_BY
  - HAVING
  - WINDOW
  - CTE_FOR_MODELLING
  - CREATE
  - INSERT
  - UPDATE
  - DELETE
  - read_parquet
  - parquet_scan
  allowed_filter_columns:
    member_name:
      operators:
      - ILIKE
      parameterized: true
    vote_question:
      operators:
      - ILIKE
      parameterized: true
    vote_date:
      operators:
      - BETWEEN
      parameterized: true
    party_name:
      operators:
      - IN
      parameterized: true
    vote_position:
      operators:
      - IN
      parameterized: true
    vote_result:
      operators:
      - IN
      parameterized: true
  allowed_sort_columns:
  - vote_date
  - member_name
  - party_name
  - constituency
  - vote_position
  - vote_result
  - vote_title
  - vote_question
  - source_url
  max_rows_default: 1000
  max_rows_hard_limit: 20000
  missing_capability_action: TODO_PIPELINE_VIEW_REQUIRED
filters:
- name: member_search
  label: Search member
  type: text_search
  column: member_name
  operator: ILIKE
  source: typed_input
  essential: true
  default: ''
  help: ''
- name: vote_search
  label: Search vote/question
  type: text_search
  column: vote_question
  operator: ILIKE
  source: typed_input
  essential: true
  default: ''
  help: ''
- name: vote_date_range
  label: Vote date
  type: date_range
  column: vote_date
  operator: BETWEEN
  source: typed_input
  essential: true
  default: ''
  help: ''
- name: party_name
  label: Party
  type: multiselect
  column: party_name
  operator: IN
  source: distinct_values_query
  essential: false
  default: []
  help: ''
- name: vote_position
  label: Vote position
  type: multiselect
  column: vote_position
  operator: IN
  source: distinct_values_query
  essential: true
  default: []
  help: ''
- name: vote_result
  label: Result
  type: multiselect
  column: vote_result
  operator: IN
  source: distinct_values_query
  essential: false
  default: []
  help: ''
metrics:
- name: visible_vote_records
  label: Visible vote records
  source: ui_result_count
  relation: v_member_votes
  column: null
  format: integer
  filtered: true
  ui_aggregation_allowed: true
- name: divisions_count
  label: Divisions
  source: pipeline_summary_view
  relation: v_votes_summary
  column: divisions_count
  format: integer
  filtered: false
  ui_aggregation_allowed: false
- name: latest_vote_date
  label: Latest vote
  source: pipeline_summary_view
  relation: v_votes_summary
  column: latest_vote_date
  format: date
  filtered: false
  ui_aggregation_allowed: false
visuals: []
tables:
- name: votes_table
  relation: v_member_votes
  role: evidence
  default_sort_by: vote_date
  default_sort_direction: desc
  columns:
  - name: vote_date
    label: Date
    type: date
    visible: true
    width: small
    help: null
  - name: member_name
    label: Member
    type: text
    visible: true
    width: medium
    help: null
  - name: party_name
    label: Party
    type: text
    visible: true
    width: small
    help: null
  - name: constituency
    label: Constituency
    type: text
    visible: true
    width: medium
    help: null
  - name: vote_position
    label: Vote
    type: text
    visible: true
    width: small
    help: null
  - name: vote_result
    label: Result
    type: text
    visible: true
    width: small
    help: null
  - name: vote_title
    label: Title
    type: text
    visible: true
    width: large
    help: null
  - name: vote_question
    label: Question
    type: long_text
    visible: true
    width: large
    help: null
  - name: source_url
    label: Source
    type: url
    visible: true
    width: medium
    help: null
exports:
  enabled: true
  formats:
  - csv
  filename_pattern: dail_tracker_votes_{date}.csv
  export_scope: displayed_rows_only
provenance:
  show_panel: true
  required_fields:
  - latest_run_id
  - latest_fetch_timestamp_utc
  - source_summary
  - mart_version
  - code_version
  caveat_text: Vote records are presented as modelled by the pipeline. The UI does not infer voting positions.
empty_states:
- condition: no_rows
  title: No votes records match these filters
  body: Try clearing one or more filters.
  recovery_hint: Clear filters or refresh the pipeline outputs.
- condition: missing_relation
  title: Dáil Votes view is missing
  body: The approved relation `v_member_votes` is not available in DuckDB.
  recovery_hint: Run the pipeline or implement the required view.
- condition: missing_columns
  title: View shape changed
  body: Required columns are missing from the approved relation.
  recovery_hint: Align the pipeline view and YAML contract.
out_of_scope:
- Do not calculate party rebellion/cohesion in Streamlit.
- Do not infer policy area from vote text.
logic_firewall:
  forbidden_python:
  - pandas_merge
  - pandas_join
  - pandas_groupby
  - pandas_pivot
  - polars_join
  - polars_group_by
  - fuzzy_match
  - raw_file_scan
  - api_call
  - pdf_parse
  - hardcoded_abs_path
  allowed_python:
  - render
  - format
  - parameter_binding
  - dataframe_column_selection
  - csv_export
  - empty_state
  missing_data_action: TODO_PIPELINE_VIEW_REQUIRED
acceptance_tests:
- Page file contains no merge, join, groupby, pivot, fuzzy matching, API calls, PDF parsing, raw Parquet scans, or hardcoded
  absolute local paths.
- SQL uses only approved relations, columns, filters, sort columns, and limits from this contract.
- Required columns are validated before rendering the table.
- CSV export contains only currently displayed rows.
- Provenance panel renders when required fields are available.
