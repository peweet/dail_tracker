name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv sync --frozen --group dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  # Dependency truth: pyproject.toml (human intent) → uv.lock (resolved env) →
  # requirements.txt (app-runtime export for Streamlit Cloud / pip fallback).
  # This job proves all three stay in sync: the lock is current with pyproject,
  # AND requirements.txt is a faithful export of the lock. A forgotten re-lock or
  # a hand-edited requirements.txt fails the PR instead of silently shipping the
  # deployed app on different versions than CI tested.
  deps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          version: "0.11.16"   # pin: keeps `uv export` output byte-stable for the diff guard
      - name: uv.lock is in sync with pyproject.toml
        run: uv lock --check
      - name: requirements.txt is a current export of uv.lock (app runtime only)
        run: |
          uv export --frozen --no-hashes --no-emit-project --no-default-groups -o requirements.txt
          git diff --exit-code -- requirements.txt

  # Streamlit logic firewall: the UI/data-access layer must read registered
  # views only — no raw parquet/CSV reads, joins, or rollups (a sanctioned
  # render-time aggregation is exempted inline with `# logic_firewall:
  # display_only`). The checker is pure-stdlib AST, so a core sync is enough.
  firewall:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv sync --frozen
      - run: uv run python tools/check_streamlit_logic_firewall.py

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      # basedpyright resolves third-party imports from .venv (see the venv keys
      # in [tool.basedpyright]). The app runtime (duckdb/streamlit/…) is core; the
      # dev group adds basedpyright and the pipeline extra adds polars/requests/…,
      # so every in-scope import resolves. Scope + rules live in pyproject.toml.
      - run: uv sync --frozen --extra pipeline --group dev
      # Scoped to services/ + pure-logic modules; fails on any NEW type error.
      - run: uv run basedpyright

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      # The app runtime (streamlit/altair/plotly/duckdb) is core; the pipeline
      # extra + dev group add polars/PyMuPDF/pytest/…, so test_page_imports.py
      # (imports every Streamlit page) plus the pipeline/schema tests all run in CI.
      - run: uv sync --frozen --extra pipeline --group dev
      # Skip markers that can't run in the default lane:
      #   integration / bronze — need committed pipeline output beyond gold.
      #   sql — runs in its own `sql-contracts` job below (against committed gold).
      #   sources — external network. Source-URL health runs on a schedule via
      #     .github/workflows/nightly.yml (pdf_endpoint_check.py), not here.
      - run: uv run pytest -m "not integration and not sql and not sources and not bronze" -v

  # SQL view contract suite (~80 tests): executes every registered view against
  # the committed gold parquet under data/gold/ (un-gitignored), so it gates PRs
  # without a pipeline build. DAIL_INTEGRATION_TESTS=1 points the view loader at
  # the real committed data instead of the small CI fixtures. A column rename or
  # cast break in any view now fails CI instead of shipping a silently-empty page.
  sql-contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv sync --frozen --extra pipeline --group dev
      # Guard against a silent all-skip pass: if the committed gold is ever
      # re-gitignored, the contract tests would skip and the job would go falsely
      # green. Fail loudly instead.
      - name: Assert committed gold is present
        run: test -f data/gold/parquet/current_dail_vote_history.parquet
      # Completeness guard: the committed gold must not have silently lost rows or
      # columns vs data/_meta/output_baseline.json. Catches a PDF/layout/schema drift
      # that parsed clean but shipped partial data. An intended change re-baselines via
      # `python tools/check_output_regressions.py --update-baseline` (commit the JSON).
      - name: Gold completeness guard (no silent row/column regression)
        run: uv run python tools/check_output_regressions.py --strict
      # Content guard: rows+columns can be intact while the DATA rots — a column going
      # all-null, duplicate rows multiplying, mojibake/sentinels leaking in. Flags only a
      # REGRESSION vs data/_meta/gold_quality_baseline.json (accepts today's known quirks,
      # catches tomorrow's drift). Re-baseline an intended change via
      # `python tools/check_gold_quality.py --update-baseline` (commit the JSON).
      - name: Gold content-quality guard (no silent content drift)
        run: uv run python tools/check_gold_quality.py --strict
      - run: uv run pytest -m sql -q
        env:
          DAIL_INTEGRATION_TESTS: "1"
