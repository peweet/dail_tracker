name: Endpoint health

# Detects link rot on the Oireachtas source side (PDF/API URLs that 404 or move)
# before users hit empty pages. This is the only "scheduled health" lane that can
# run in CI today: the integration/sql/bronze test markers need committed pipeline
# output (data/gold is gitignored), so they stay local-only until that data is
# fixtured or built in CI (see doc/CI_CD.md Phase 6).

on:
  schedule:
    - cron: "0 8 * * 1"   # Monday 08:00 UTC — matches audit.yml + Dependabot cadence
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  endpoints:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync --frozen
      # Exits non-zero if any source URL is broken (see __main__ in the script).
      - name: Check source endpoints
        run: uv run python -m pdf_infra.pdf_endpoint_check
      - name: Open issue on failure (scheduled runs only)
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              ...context.repo,
              title: `Source endpoint check found broken URLs (${new Date().toISOString().slice(0, 10)})`,
              body: `One or more Oireachtas source URLs are unreachable.\n\nRun: ${context.payload.repository.html_url}/actions/runs/${context.runId}\n\nThe job log lists each [BROKEN] URL and the suggested action (usually: find the moved PDF on the source portal and update constants.py).`,
              labels: ["sources", "link-rot"],
            });
