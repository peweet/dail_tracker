contract_version: 1
page:
  id: committees
  title: Committee Assignments
  route: utility/pages_code/committees.py
  nav_label: Committees
  nav_icon: 🏛️
  status: active
  priority: secondary
intent:
  user_promise: Show which members sit on which committees, their roles, and whether assignments are current.
  primary_users:
  - public
  - journalists
  - researchers
  top_questions:
  - Which committees is a member assigned to?
  - Who sits on a committee?
  - What role does the member hold?
design:
  aesthetic: newsroom_light
  tone: direct_civic_accountable
  css_source: utility/styles/base.css
  reuse_classes:
  - dt-hero
  - dt-kicker
  - dt-dek
  - dt-badge
  - dt-callout
  - dt-provenance-box
  layout:
    hero: editorial
    filters: sidebar
    density: compact
    mobile_strategy: stack_filters_then_table
  avoid:
  - generic_streamlit_defaults
  - purple_gradients
  - glassmorphism
  - custom_js
  - page_local_global_css
data_access:
  mode: duckdb_sql_over_pipeline_views
  database: data/gold/dail.duckdb
  view_owner: pipeline
  raw_parquet_access_in_streamlit: false
  approved_relations:
  - name: v_committee_assignments
    role: primary
    grain: one row per member committee assignment
    primary_key: committee_assignment_id
    required_columns:
    - committee_assignment_id
    - member_id
    - member_name
    - party_name
    - constituency
    - house
    - committee_name
    - committee_role
    - assignment_start_date
    - assignment_end_date
    - is_current
    - latest_fetch_timestamp_utc
    optional_columns: []
    provenance_columns:
    - latest_run_id
    - latest_fetch_timestamp_utc
    - source_summary
    - mart_version
    - code_version
  - name: v_committee_summary
    role: summary
    grain: one row for latest committee summary
    primary_key: latest_run_id
    required_columns:
    - latest_run_id
    - committee_count
    - assignment_count
    - current_assignment_count
    optional_columns: []
    provenance_columns:
    - latest_run_id
    - latest_fetch_timestamp_utc
    - source_summary
    - mart_version
    - code_version
sql_policy:
  claude_may_generate_sql: true
  sql_kind_allowed: retrieval_only
  parameterized_queries_required: true
  explicit_column_projection_required: true
  allowed_statements:
  - SELECT
  forbidden_sql:
  - JOIN
  - GROUP_BY
  - HAVING
  - WINDOW
  - CTE_FOR_MODELLING
  - CREATE
  - INSERT
  - UPDATE
  - DELETE
  - read_parquet
  - parquet_scan
  allowed_filter_columns:
    member_name:
      operators:
      - ILIKE
      parameterized: true
    committee_name:
      operators:
      - IN
      parameterized: true
    committee_role:
      operators:
      - IN
      parameterized: true
    party_name:
      operators:
      - IN
      parameterized: true
    is_current:
      operators:
      - '='
      parameterized: true
  allowed_sort_columns:
  - member_name
  - party_name
  - constituency
  - committee_name
  - committee_role
  - is_current
  - assignment_start_date
  - assignment_end_date
  max_rows_default: 1000
  max_rows_hard_limit: 1000
  missing_capability_action: TODO_PIPELINE_VIEW_REQUIRED
filters:
- name: member_search
  label: Search member
  type: text_search
  column: member_name
  operator: ILIKE
  source: typed_input
  essential: true
  default: ''
  help: ''
- name: committee_name
  label: Committee
  type: multiselect
  column: committee_name
  operator: IN
  source: distinct_values_query
  essential: true
  default: []
  help: ''
- name: committee_role
  label: Role
  type: multiselect
  column: committee_role
  operator: IN
  source: distinct_values_query
  essential: false
  default: []
  help: ''
- name: party_name
  label: Party
  type: multiselect
  column: party_name
  operator: IN
  source: distinct_values_query
  essential: false
  default: []
  help: ''
- name: current_only
  label: Current assignments only
  type: toggle
  column: is_current
  operator: '='
  source: typed_input
  essential: true
  default: true
  help: ''
metrics:
- name: visible_assignments
  label: Visible assignments
  source: ui_result_count
  relation: v_committee_assignments
  column: null
  format: integer
  filtered: true
  ui_aggregation_allowed: true
- name: committee_count
  label: Committees
  source: pipeline_summary_view
  relation: v_committee_summary
  column: committee_count
  format: integer
  filtered: false
  ui_aggregation_allowed: false
- name: current_assignment_count
  label: Current assignments
  source: pipeline_summary_view
  relation: v_committee_summary
  column: current_assignment_count
  format: integer
  filtered: false
  ui_aggregation_allowed: false
visuals: []
tables:
- name: committees_table
  relation: v_committee_assignments
  role: evidence
  default_sort_by: committee_name
  default_sort_direction: asc
  columns:
  - name: member_name
    label: Member
    type: text
    visible: true
    width: medium
    help: null
  - name: party_name
    label: Party
    type: text
    visible: true
    width: small
    help: null
  - name: constituency
    label: Constituency
    type: text
    visible: true
    width: medium
    help: null
  - name: committee_name
    label: Committee
    type: text
    visible: true
    width: large
    help: null
  - name: committee_role
    label: Role
    type: text
    visible: true
    width: medium
    help: null
  - name: is_current
    label: Current
    type: boolean
    visible: true
    width: small
    help: null
  - name: assignment_start_date
    label: From
    type: date
    visible: true
    width: small
    help: null
  - name: assignment_end_date
    label: To
    type: date
    visible: true
    width: small
    help: null
exports:
  enabled: true
  formats:
  - csv
  filename_pattern: dail_tracker_committees_{date}.csv
  export_scope: displayed_rows_only
provenance:
  show_panel: true
  required_fields:
  - latest_run_id
  - latest_fetch_timestamp_utc
  - source_summary
  - mart_version
  - code_version
  caveat_text: Committee assignments reflect latest processed source data. Current status is pipeline-owned.
empty_states:
- condition: no_rows
  title: No committees records match these filters
  body: Try clearing one or more filters.
  recovery_hint: Clear filters or refresh the pipeline outputs.
- condition: missing_relation
  title: Committee Assignments view is missing
  body: The approved relation `v_committee_assignments` is not available in DuckDB.
  recovery_hint: Run the pipeline or implement the required view.
- condition: missing_columns
  title: View shape changed
  body: Required columns are missing from the approved relation.
  recovery_hint: Align the pipeline view and YAML contract.
out_of_scope:
- Do not infer current status from dates in Streamlit.
- Do not join member metadata in Streamlit.
logic_firewall:
  forbidden_python:
  - pandas_merge
  - pandas_join
  - pandas_groupby
  - pandas_pivot
  - polars_join
  - polars_group_by
  - fuzzy_match
  - raw_file_scan
  - api_call
  - pdf_parse
  - hardcoded_abs_path
  allowed_python:
  - render
  - format
  - parameter_binding
  - dataframe_column_selection
  - csv_export
  - empty_state
  missing_data_action: TODO_PIPELINE_VIEW_REQUIRED
acceptance_tests:
- Page file contains no merge, join, groupby, pivot, fuzzy matching, API calls, PDF parsing, raw Parquet scans, or hardcoded
  absolute local paths.
- SQL uses only approved relations, columns, filters, sort columns, and limits from this contract.
- Required columns are validated before rendering the table.
- CSV export contains only currently displayed rows.
- Provenance panel renders when required fields are available.
